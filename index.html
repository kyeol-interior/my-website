<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 홈페이지</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f0f2f5;
    }

    header {
      background: #333;
      color: white;
      padding: 15px;
      text-align: center;
    }

    nav {
      background: #555;
      padding: 10px;
      text-align: center;
      position: sticky;
      top: 0;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: yellow;
    }

    html {
      scroll-behavior: smooth;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;

      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .box {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      scroll-margin-top: 60px;
      text-align: center;
    }

    h1 {
      margin: 0;
    }

    h2 {
      margin-top: 0;
      color: #333;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      background: red;
      color: white;
      padding: 20px 30px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 20px;
    }

    button:hover {
      background: darkred;
    }

    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 10px;
    }

    /* 👉 모바일 전용 (이것만 넣는 곳!) */
    @media (max-width: 600px) {
      .container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>내 첫 홈페이지</h1>
</header>

<nav>
  <a href="#home">홈</a>
  <a href="#about">소개</a>
  <a href="#contact">연락처</a>
</nav>

<div class="container">

  <div id="home" class="box">
    <h2>환영합니다 👋</h2>
    <p>이곳은 내가 만든 홈페이지입니다.</p>
    <button onclick="alert('환영합니다!')">클릭해보세요</button>
  </div>

  <div id="about" class="box">
    <h2>소개</h2>
    <p>HTML과 CSS로 만든 사이트입니다.</p>
    <img src="https://picsum.photos/600/300" alt="이미지">
  </div>

  <div id="contact" class="box">
    <h2>연락처</h2>
    <p>이메일: test@test.com</p>
  </div>

</div>

<footer>
  <p>© 2026 내 홈페이지</p>
</footer>

</body>
</html>
